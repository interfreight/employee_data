<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Employee Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef3f9;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.back-btn{
background:#003366;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-weight:600;
margin-bottom:20px;
}

.back-btn:hover{
opacity:.9;
}

.profile-header{
background:linear-gradient(135deg,#003366,#00509d);
color:white;
padding:30px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.profile-name{
font-size:30px;
font-weight:700;
}

.profile-role{
opacity:.9;
margin-top:5px;
}

.status{
padding:10px 18px;
border-radius:30px;
background:#00c853;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.card h2{
color:#003366;
margin-bottom:20px;
font-size:20px;
border-bottom:2px solid #f1f1f1;
padding-bottom:10px;
}

.info{
margin-bottom:12px;
font-size:15px;
}

.info strong{
display:block;
color:#003366;
margin-bottom:3px;
}

.leave-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.leave-card{
padding:18px;
border-radius:15px;
background:#f7f9fc;
text-align:center;
border:1px solid #e4e9f0;
}

.leave-card h3{
color:#003366;
margin-bottom:10px;
}

.leave-number{
font-size:32px;
font-weight:bold;
color:#00509d;
}

.loading{
text-align:center;
font-size:18px;
padding:50px;
}

@media(max-width:768px){

.profile-header{
flex-direction:column;
text-align:center;
gap:15px;
}

.leave-grid{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div class="container">

<button class="back-btn" onclick="goBack()">
← Back to Employee List
</button>

<div id="profileData" class="loading">
Loading Employee Profile...
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const db =
window.supabase.createClient(
"https://tuihpvykuqbqnfyfepql.supabase.co",
"YOUR_ANON_KEY"
);

const params =
new URLSearchParams(window.location.search);

const userId =
params.get("id");

function goBack(){
window.location.href =
"https://interfreight.github.io/Hr_Dashboard/";
}

loadProfile();

async function loadProfile(){

const { data:user } =
await db
.from("users")
.select("*")
.eq("id", userId)
.single();

const { data:profile } =
await db
.from("employee_profiles")
.select("*")
.eq("user_id", userId)
.single();

document.getElementById("profileData").innerHTML = `

<div class="profile-header">

<div>
<div class="profile-name">
${user.full_name || 'N/A'}
</div>

<div class="profile-role">
${user.role || ''} • ${user.department || ''}
</div>
</div>

<div class="status">
${user.status || 'Active'}
</div>

</div>

<div class="grid">

<div class="card">
<h2>Personal Information</h2>

<div class="info">
<strong>Full Name</strong>
${user.full_name || '-'}
</div>

<div class="info">
<strong>Email</strong>
${user.email || '-'}
</div>

<div class="info">
<strong>Address</strong>
${profile.address || '-'}
</div>
</div>

<div class="card">
<h2>Employment Information</h2>

<div class="info">
<strong>Department</strong>
${user.department || '-'}
</div>

<div class="info">
<strong>Position</strong>
${profile.position || '-'}
</div>

<div class="info">
<strong>Employment Status</strong>
${profile.employment_status || '-'}
</div>

<div class="info">
<strong>Date Hired</strong>
${profile.date_hired || '-'}
</div>
</div>

<div class="card">
<h2>Emergency Contact</h2>

<div class="info">
<strong>Contact Person</strong>
${profile.emergency_contact_name || '-'}
</div>

<div class="info">
<strong>Contact Number</strong>
${profile.emergency_contact_number || '-'}
</div>
</div>

<div class="card">
<h2>Government IDs</h2>

<div class="info">
<strong>SSS</strong>
${profile.sss || '-'}
</div>

<div class="info">
<strong>PhilHealth</strong>
${profile.philhealth || '-'}
</div>

<div class="info">
<strong>Pag-IBIG</strong>
${profile.pagibig || '-'}
</div>

<div class="info">
<strong>TIN</strong>
${profile.tin || '-'}
</div>
</div>

<div class="card" style="grid-column:1/-1;">
<h2>Leave Credits</h2>

<div class="leave-grid">

<div class="leave-card">
<h3>Vacation Leave</h3>
<div class="leave-number">
${profile.vacation_leave || 0}
</div>
</div>

<div class="leave-card">
<h3>Sick Leave</h3>
<div class="leave-number">
${profile.sick_leave || 0}
</div>
</div>

<div class="leave-card">
<h3>Emergency Leave</h3>
<div class="leave-number">
${profile.emergency_leave || 0}
</div>
</div>

<div class="leave-card">
<h3>Birthday Leave</h3>
<div class="leave-number">
${profile.birthday_leave || 0}
</div>
</div>

</div>
</div>

<div class="card" style="grid-column:1/-1;">
<h2>System Information</h2>

<div class="info">
<strong>Profile Completed</strong>
${profile.profile_completed ? 'Yes' : 'No'}
</div>

<div class="info">
<strong>Created At</strong>
${profile.created_at || '-'}
</div>

<div class="info">
<strong>Updated At</strong>
${profile.updated_at || '-'}
</div>
</div>

</div>
`;
}

</script>

</body>
</html>
